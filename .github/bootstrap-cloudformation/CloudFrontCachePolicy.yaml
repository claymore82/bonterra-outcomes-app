AWSTemplateFormatVersion: '2010-09-09'
Description: Shared CloudFront Cache Policy for bonstart-template deployments

Resources:
  BonstartTemplateCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: BonstartTemplate-OpenNext
        Comment: Shared cache policy for bonstart-template SST deployments to avoid naming conflicts
        DefaultTTL: 0
        MaxTTL: 31536000 # 1 year in seconds
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: whitelist
            Headers:
              - x-open-next-cache-key
          QueryStringsConfig:
            QueryStringBehavior: all
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

Outputs:
  BonstartTemplateCachePolicyId:
    Description: ID of the shared CloudFront Cache Policy
    Value: !Ref BonstartTemplateCachePolicy
    Export:
      Name: BonstartTemplate-CachePolicyId