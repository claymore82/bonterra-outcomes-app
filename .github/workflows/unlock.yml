# ==============================================================================
# SST Unlock
# ==============================================================================
#
# Purpose: Unlocks a SST stage
#
# This workflow unlocks a SST stage. Run it on the branch that you want to unlock.
# Stages without branches will need to be unlocked manually.
#
# Supported Environments: all
#
# Runners: GitHub provided runners
# ==============================================================================

name: Unlock SST Stage

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  select_environment:
    name: Select Environment
    uses: ./.github/workflows/select-environment.yml
    secrets:
      REPO_TOKEN: ${{ secrets.GHA_REPO_TOKEN }}

  unlock:
    name: Unlock SST Stage
    runs-on: ubuntu-latest
    needs: select_environment
    environment: ${{ needs.select_environment.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Clean up existing .npmrc
        run: rm -f .npmrc

      - name: Configure npm for private packages
        run: |
          echo "@bonterratech:registry=https://npm.pkg.github.com/" > .npmrc
          echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "@awesome.me:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_NPM_TOKEN }}" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.STITCH_TOKEN }}" >> .npmrc

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Unlock-${{ needs.select_environment.outputs.sst_stage_short }}

      - name: Install Dependencies
        run: npm ci

      - name: Unlock SST Stage
        run: |
          echo "Unlocking SST stage: ${{ needs.select_environment.outputs.sst_stage }}"
          npx sst unlock --stage ${{ needs.select_environment.outputs.sst_stage }}
          echo "✅ Unlocked SST stage: ${{ needs.select_environment.outputs.sst_stage }}" >> $GITHUB_STEP_SUMMARY

