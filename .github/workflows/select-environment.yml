# ==============================================================================
# Environment Selection Workflow
# ==============================================================================
#
# Purpose: Determines the target environment and SST stage for deployments based on Git branch context
#
# This reusable workflow provides centralized environment selection logic for deployment
# workflows. It maps specific branches to named environments, creates ephemeral environments
# for feature branches, and outputs environment metadata for use by calling workflows.
#
# ==============================================================================

name: Select Environment

on:
  workflow_call:
    secrets:
      REPO_TOKEN:
        description: 'GitHub token with repo admin permissions to manage environments'
        required: true
    outputs:
      environment:
        description: 'The target GitHub Environment name (e.g., prod, staging, develop, or ephemeral)'
        value: ${{ jobs.select_environment.outputs.environment }}
      environment_type:
        description: 'The determined environment type (long-lived or ephemeral)'
        value: ${{ jobs.select_environment.outputs.environment_type }}
      sst_stage:
        description: 'The target SST stage name (e.g., prod, staging, develop, or branch-based)'
        value: ${{ jobs.select_environment.outputs.sst_stage }}
      sst_stage_short:
        description: 'The target SST stage name (truncated to 16 characters)'
        value: ${{ jobs.select_environment.outputs.sst_stage_short }}

defaults:
  run:
    shell: bash

jobs:
  select_environment:
    name: Select Environment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        id: select-environment
        with:
          github-token: ${{ secrets.REPO_TOKEN }}
          script: |
            core.info('Event name: ' + context.eventName);
            core.info('Context ref: ' + context.ref);

            const branchToEnvironment = {
                'main': 'prod',
                'develop': 'develop'
            };

            let environment = 'ephemeral';
            let environment_type = 'ephemeral';
            let sst_stage = '';

            let ref = context.ref.replace('refs/heads/', '');

            // For pull requests, use the head ref (source branch being merged FROM)
            if (context.eventName === 'pull_request') {
              core.info('Pull request detected');
              ref = context.payload.pull_request.head.ref;
            }
            // delete events store the deleted branch in the event payload
            else if (context.eventName === 'delete') {
              core.info('Delete event detected');
              ref = context.payload.ref;
            }

            core.info('Assigned ref: ' + ref);

            if (ref in branchToEnvironment) {
                core.info('Found environment in dictionary by using push branch');
                environment = branchToEnvironment[ref];
                environment_type = 'long-lived';
                sst_stage = environment;
            } else {
              core.info('Using ephemeral environment based on branch');
              // No slashes in the environment name (GitHub requirement)
              // No underscores in the environment name (SST requirement)
              sst_stage = ref.replaceAll('/', '-').replaceAll('_', '-');
            }

            const sst_stage_short = sst_stage.substring(0, 16);

            core.info('Environment: ' + environment);
            core.info('Environment Type: ' + environment_type);
            core.info('SST Stage: ' + sst_stage);
            core.info('SST Stage Short: ' + sst_stage_short);

            core.summary.addHeading('Environment: ' + environment);
            core.summary.addRaw('Environment Type: ' + environment_type, true);
            core.summary.addRaw('SST Stage: ' + sst_stage, true);
            core.summary.addRaw('SST Stage Short: ' + sst_stage_short, true);
            core.summary.write();

            core.setOutput('environment', environment);
            core.setOutput('environment_type', environment_type);
            core.setOutput('sst_stage', sst_stage);
            core.setOutput('sst_stage_short', sst_stage_short);
    outputs:
      environment: ${{ steps.select-environment.outputs.environment }}
      environment_type: ${{ steps.select-environment.outputs.environment_type }}
      sst_stage: ${{ steps.select-environment.outputs.sst_stage }}
      sst_stage_short: ${{ steps.select-environment.outputs.sst_stage_short }}