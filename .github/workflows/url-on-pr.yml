# ==============================================================================
# Pull Request URL Comment Workflow
# ==============================================================================
#
# Purpose: Automatically adds deployment URLs to pull request comments for easy review access
#
# This workflow enhances the pull request review process by automatically detecting
# deployed environments for feature branches and posting the deployment URL as a
# comment on the PR. It checks for existing SST stages and updates comments to
# avoid duplication.
#
# Supported Environments: All
#
# Runners: GitHub provided runners
# ==============================================================================

name: Add Site URL to PR
on:
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  packages: read

jobs:
  select-environment:
    uses: ./.github/workflows/select-environment.yml
    secrets:
      REPO_TOKEN: ${{ secrets.GHA_REPO_TOKEN }}

  comment-pr:
    runs-on: ubuntu-latest
    needs: select-environment
    environment: ${{ needs.select-environment.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Clean up existing .npmrc
        run: rm -f .npmrc

      - name: Configure npm for private packages
        run: |
          echo "@bonterratech:registry=https://npm.pkg.github.com/" > .npmrc
          echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "@awesome.me:registry=https://npm.fontawesome.com/" >> .npmrc
          echo "//npm.fontawesome.com/:_authToken=${{ secrets.FONT_AWESOME_NPM_TOKEN }}" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.STITCH_TOKEN }}" >> .npmrc

      - name: Install Dependencies
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-PR-Comment-${{ needs.select-environment.outputs.sst_stage_short }}

      - name: SST Stage Exists
        id: stage-exists
        run: |
          STAGE_NAME="${{ needs.select-environment.outputs.sst_stage }}"

          # Export SST state for the stage
          if npx sst state export --stage "$STAGE_NAME" > /tmp/sst-state.json 2>&1; then
            echo "SST stage $STAGE_NAME exists"
            echo "stage_exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "SST stage $STAGE_NAME does not exist"
            echo "stage_exists=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Get Site URL
        id: site-url
        if: steps.stage-exists.outputs.stage_exists == '1'
        run: |
          # Extract Site URL from SST state using the Pulumi Stack outputs
          SITE_URL=$(jq -r '.latest.resources[] | select(.type == "pulumi:pulumi:Stack") | .outputs.url' /tmp/sst-state.json)
          echo "Site URL based on SST state output: $SITE_URL"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Comment PR
        if: steps.stage-exists.outputs.stage_exists == '1'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GHA_REPO_TOKEN }}
          script: |
            // You need to use the issues API to create timeline comments.
            // The PR API lets you add the comments that are context sensitive
            // to a particular commit/section of code. All PRs
            // are issues, but not all issues are PRs.

            if (!URL.canParse('${{ steps.site-url.outputs.site_url }}')) {
              console.log('Invalid URL: ${{ steps.site-url.outputs.site_url }}');
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const commentBody = `🚀 Deployment URL: ${{ steps.site-url.outputs.site_url }}`;

            // Get existing comments
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            // Check if our comment already exists
            const deploymentComment = comments.data.find(comment =>
              comment.body.startsWith('🚀 Deployment URL:')
            );

            if (deploymentComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: deploymentComment.id,
                body: commentBody,
              });
              console.log('Updated existing comment');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
              console.log('Created new comment');
            }

