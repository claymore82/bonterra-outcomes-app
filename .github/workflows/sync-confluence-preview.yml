# ==============================================================================
# Confluence Preview Workflow (Pull Requests) - Template (consumer repos)
# ==============================================================================
#
# This workflow is managed by bonterra-docs (SDD-001).
# It downloads a pinned bon-architect runtime bundle (no vendored sync scripts).
#
# ============================================================================== 

name: Confluence Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'framework/**'
      - 'tooling/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  preview:
    name: Sync Preview
    runs-on: ubuntu-latest

    env:
      BON_DOCS_TOOLCHAIN_VERSION: v0.1.5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # NOTE: No npm ci here. Docs workflows should not require application deps.

      - name: Docs quality gates
        uses: bonterratech/bon-architect/.github/actions/bonterra-docs-quality-gates@v0.1.5
        with:
          docs_dir: docs

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Cache Mermaid CLI
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-mermaid-cli
          restore-keys: |
            ${{ runner.os }}-mermaid-cli-

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Acquire docs runtime bundle
        uses: bonterratech/bon-architect/.github/actions/bonterra-docs-runtime@v0.1.5
        with:
          out_dir: /tmp/bonterra-docs-runtime

      - name: Install Python dependencies (runtime bundle)
        working-directory: /tmp/bonterra-docs-runtime/tooling/scripts/confluence
        run: uv sync --locked

      - name: Get or Create Drafts Page
        id: drafts
        env:
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_EMAIL: ${{ vars.CONFLUENCE_EMAIL }}
        run: |
          STRUCTURE_FILE="framework/output-structure.txt"
          PARENT_TITLE=$(grep '^parent:' "$STRUCTURE_FILE" | cut -d: -f3)
          CHILD_PREFIX=$(grep '^child_prefix:' "$STRUCTURE_FILE" | cut -d: -f2)

          if [[ -z "$PARENT_TITLE" ]]; then
            echo "❌ No parent page title found in $STRUCTURE_FILE"
            exit 1
          fi

          PROD_PAGE_ID=$(uv run --project /tmp/bonterra-docs-runtime/tooling/scripts/confluence \
            python3 /tmp/bonterra-docs-runtime/tooling/scripts/confluence/get-or-create-page.py \
            --space-key "${{ vars.CONFLUENCE_SPACE_KEY }}" \
            --parent-id "${{ vars.CONFLUENCE_PARENT_ID }}" \
            --title "$PARENT_TITLE")

          echo "prod_page_id=$PROD_PAGE_ID" >> $GITHUB_OUTPUT

          DRAFTS_TITLE="[${CHILD_PREFIX}] Drafts - Open Pull Requests"
          DRAFTS_ID=$(uv run --project /tmp/bonterra-docs-runtime/tooling/scripts/confluence \
            python3 /tmp/bonterra-docs-runtime/tooling/scripts/confluence/get-or-create-page.py \
            --space-key "${{ vars.CONFLUENCE_SPACE_KEY }}" \
            --parent-id "$PROD_PAGE_ID" \
            --title "$DRAFTS_TITLE")

          echo "drafts_id=$DRAFTS_ID" >> $GITHUB_OUTPUT

      - name: Sync Preview to Confluence
        id: sync
        env:
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_EMAIL: ${{ vars.CONFLUENCE_EMAIL }}
        run: |
          /tmp/bonterra-docs-runtime/tooling/scripts/sync-to-confluence.sh \
            --parent-id "${{ steps.drafts.outputs.drafts_id }}" \
            --docs-dir docs \
            --title-prefix "[PR-${{ github.event.pull_request.number }}]" 2>&1 | tee /tmp/sync-output.txt || true

          PAGE_ID=$(grep -o 'pages/[0-9]*' /tmp/sync-output.txt | head -1 | sed 's/pages\///')
          echo "page_id=$PAGE_ID" >> $GITHUB_OUTPUT

      - name: Fetch Confluence Comments
        id: comments
        if: steps.drafts.outputs.prod_page_id != ''
        env:
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEY: ${{ vars.CONFLUENCE_SPACE_KEY }}
          CONFLUENCE_EMAIL: ${{ vars.CONFLUENCE_EMAIL }}
        run: |
          PROD_PAGE_ID="${{ steps.drafts.outputs.prod_page_id }}"
          SPACE_KEY="${{ vars.CONFLUENCE_SPACE_KEY }}"
          PAGE_URL="https://bonterra.atlassian.net/wiki/spaces/${SPACE_KEY}/pages/${PROD_PAGE_ID}"

          COMMENTS=$(uv run --project /tmp/bonterra-docs-runtime/tooling/scripts/confluence \
            python3 /tmp/bonterra-docs-runtime/tooling/scripts/confluence/fetch-comments.py "$PROD_PAGE_ID" \
              --space-key "$SPACE_KEY" --page-url "$PAGE_URL" --include-children 2>/dev/null || echo "")

          echo "comments<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMENTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const prefix = `[PR-${issue_number}]`;
            const pageId = '${{ steps.sync.outputs.page_id }}';
            const confluenceComments = `${{ steps.comments.outputs.comments }}`;

            const spaceKey = '${{ vars.CONFLUENCE_SPACE_KEY }}';
            const confluenceUrl = pageId
              ? `https://bonterra.atlassian.net/wiki/spaces/${spaceKey}/pages/${pageId}`
              : null;

            const marker = '📄 **Confluence Preview**';
            let body = `${marker}\n\n`;

            if (confluenceUrl) {
              body += `**[View Preview in Confluence](${confluenceUrl})**\n\n`;
            }

            body += `Documentation synced with prefix: \`${prefix}\`\n\n`;

            if (confluenceComments && confluenceComments.trim() && !confluenceComments.includes('No open inline comments')) {
              body += `---\n\n${confluenceComments}\n\n`;
            }

            body += `_Preview pages will be automatically deleted when this PR is closed._`;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existingComment = comments.data.find(comment => comment.body.startsWith(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existingComment.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
